# Docker Compose for Local Development
# 本地开发环境 - 仅启动依赖服务（PostgreSQL, Redis）
# 后端服务在本地运行：cd backend && uv run uvicorn src.main:app --reload

name: shrimp-dev

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shrimp-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env.development
    volumes:
      - shrimp-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrimp -d shrimp_market_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: shrimp-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - shrimp-dev-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  shrimp-dev-postgres:
  shrimp-dev-redis: