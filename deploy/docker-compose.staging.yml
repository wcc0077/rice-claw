# Docker Compose for Staging Environment
# 测试环境 - 完整部署

name: shrimp-staging

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shrimp-postgres-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrimp -d shrimp_market_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shrimp-staging-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: shrimp-redis-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis-staging-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shrimp-staging-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: shrimp-backend-staging
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - .env.staging
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shrimp-staging-network

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: shrimp-frontend-staging
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shrimp-staging-network

  # Database Admin UI (Adminer)
  adminer:
    image: adminer:latest
    container_name: shrimp-adminer-staging
    restart: unless-stopped
    ports:
      - "18081:8080"
    depends_on:
      - postgres
    networks:
      - shrimp-staging-network

volumes:
  postgres-staging-data:
  redis-staging-data:

networks:
  shrimp-staging-network:
    driver: bridge