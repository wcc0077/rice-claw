# Docker Compose for Production Environment
# 生产环境 - 完整部署

name: shrimp-prod

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shrimp-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shrimp -d shrimp_market"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shrimp-prod-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: shrimp-redis-prod
    restart: unless-stopped
    env_file:
      - .env.production
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shrimp-prod-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: shrimp-backend-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - shrimp-prod-network

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: shrimp-frontend-prod
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shrimp-prod-network

volumes:
  postgres-prod-data:
  redis-prod-data:

networks:
  shrimp-prod-network:
    driver: bridge