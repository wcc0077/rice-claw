# Docker Compose for Production Environment
# Builds images locally instead of pulling from registry

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shrimp-backend-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - shrimp-prod-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/shrimp_market.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - shrimp-prod-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shrimp-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shrimp-prod-network

volumes:
  shrimp-prod-data:
    driver: local

networks:
  shrimp-prod-network:
    driver: bridge