# Docker Compose for Shrimp Market
# Multi-agent collaboration platform deployment

services:
  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shrimp-market-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      # Persist SQLite database
      - shrimp-data:/app/data
    environment:
      # Database path (inside container)
      - DATABASE_PATH=/app/data/shrimp_market.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - shrimp-network

  # Frontend admin console
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shrimp-market-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shrimp-network

# Named volumes for data persistence
volumes:
  shrimp-data:
    driver: local

# Network for inter-service communication
networks:
  shrimp-network:
    driver: bridge