# CI/CD Pipeline for Shrimp Market (Local Build)
#
# Triggered by:
#   - Push to main: Deploy to staging environment
#   - Release: Deploy to production environment
#   - Manual: workflow_dispatch
#
# Requirements:
#   - GitHub Secrets: SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SERVER_SSH_PORT
#   - Server: Docker, Docker Compose, Git installed

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# 并发控制：同一分支只运行一个部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 检测是否需要生成迁移文件（仅检测，不运行）
  check-migration:
    runs-on: ubuntu-latest
    outputs:
      needs_migration: ${{ steps.check.outputs.needs_migration }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.local/share/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Check for model changes
        id: check
        working-directory: backend
        run: |
          # 启动临时数据库
          docker run -d --name temp-postgres -e POSTGRES_USER=test -e POSTGRES_PASSWORD=test -e POSTGRES_DB=test -p 5432:5432 postgres:16-alpine
          sleep 5

          # 设置测试数据库连接
          export DB_TYPE=postgresql
          export POSTGRES_HOST=localhost
          export POSTGRES_USER=test
          export POSTGRES_PASSWORD=test
          export POSTGRES_DB=test

          # 检测是否有模型变化需要迁移
          uv run alembic revision --autogenerate -m "check_migration" --dry-run 2>&1 | tee check_output.txt

          # 如果输出包含 "Target database is not up to date" 或有新迁移
          if grep -q "Detected new changes\|Target database is not up to date" check_output.txt; then
            echo "needs_migration=true" >> $GITHUB_OUTPUT
            echo "::warning::模型发生变化，需要生成迁移文件！请运行: uv run alembic revision --autogenerate -m \"your_message\""
          else
            echo "needs_migration=false" >> $GITHUB_OUTPUT
          fi

          # 清理
          docker stop temp-postgres && docker rm temp-postgres

  deploy:
    needs: check-migration
    if: needs.check-migration.outputs.needs_migration != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "compose_file=deploy/docker-compose.prod.yml" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "production" ]]; then
              echo "env=prod" >> $GITHUB_OUTPUT
              echo "compose_file=deploy/docker-compose.prod.yml" >> $GITHUB_OUTPUT
            else
              echo "env=staging" >> $GITHUB_OUTPUT
              echo "compose_file=deploy/docker-compose.staging.yml" >> $GITHUB_OUTPUT
            fi
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "compose_file=deploy/docker-compose.staging.yml" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e

            echo "=========================================="
            echo "Deploying ${{ steps.env.outputs.env }} environment"
            echo "Trigger: ${{ github.event_name }}"
            echo "=========================================="

            # Navigate to project directory
            cd /opt/shrimp-market

            # Pull latest code
            echo "Pulling latest code..."
            git pull origin main

            # Inject secrets into env files
            echo "Injecting secrets..."
            if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
              sed -i "s/your_access_key_id_here/${{ secrets.ALIYUN_ACCESS_KEY_ID }}/g" deploy/.env.production
              sed -i "s/your_access_key_secret_here/${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}/g" deploy/.env.production
            else
              sed -i "s/your_access_key_id_here/${{ secrets.ALIYUN_ACCESS_KEY_ID }}/g" deploy/.env.staging
              sed -i "s/your_access_key_secret_here/${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}/g" deploy/.env.staging
            fi

            # Set project name based on environment
            if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
              export COMPOSE_PROJECT_NAME=shrimp-prod
            else
              export COMPOSE_PROJECT_NAME=shrimp-staging
            fi

            # Build images with cache (faster rebuilds)
            echo "Building Docker images (with cache)..."
            docker compose -f ${{ steps.env.outputs.compose_file }} build

            # Stop old containers and start new ones
            echo "Restarting services..."
            docker compose -f ${{ steps.env.outputs.compose_file }} down

            # Start services (don't wait for health checks)
            docker compose -f ${{ steps.env.outputs.compose_file }} up -d --no-deps postgres redis || true

            # Wait for PostgreSQL to be ready
            echo "Waiting for PostgreSQL to initialize..."
            sleep 10
            for i in {1..30}; do
              if docker exec shrimp-postgres-staging pg_isready 2>/dev/null; then
                echo "PostgreSQL is ready!"
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 2
            done

            # Ensure user and database exist (handle old data volumes)
            # Note: Using 'shrimp' user since POSTGRES_USER=shrimp creates it as superuser
            # The default 'postgres' user doesn't exist when POSTGRES_USER is set
            echo "Ensuring PostgreSQL database exists..."
            if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
              # Check if database exists, create if not
              docker exec shrimp-postgres-prod psql -U shrimp -d postgres -c "SELECT 1 FROM pg_database WHERE datname = 'shrimp_market'" | grep -q 1 || \
                docker exec shrimp-postgres-prod psql -U shrimp -d postgres -c "CREATE DATABASE shrimp_market"
            else
              # Check if database exists, create if not
              docker exec shrimp-postgres-staging psql -U shrimp -d postgres -c "SELECT 1 FROM pg_database WHERE datname = 'shrimp_market_staging'" | grep -q 1 || \
                docker exec shrimp-postgres-staging psql -U shrimp -d postgres -c "CREATE DATABASE shrimp_market_staging"
            fi

            # Now start backend
            docker compose -f ${{ steps.env.outputs.compose_file }} up -d --no-deps backend || true
            docker compose -f ${{ steps.env.outputs.compose_file }} up -d --no-deps frontend adminer || true

            # Wait for backend to start (entrypoint does migrations)
            echo "Waiting for backend to initialize..."
            sleep 30

            # Show backend logs for debugging
            echo "Backend logs (last 200 lines):"
            docker logs shrimp-backend-staging --tail 200 2>&1 || true

            # Check if backend is running
            if ! docker ps | grep -q shrimp-backend-staging; then
              echo "ERROR: Backend container is not running!"
              docker logs shrimp-backend-staging 2>&1 || true
              exit 1
            fi

            # Verify database migration
            echo "Verifying database migration..."
            if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
              docker exec shrimp-postgres-prod psql -U shrimp -d shrimp_market -c "SELECT version_num FROM alembic_version;" 2>/dev/null || echo "Migration table will be created by backend"
            else
              docker exec shrimp-postgres-staging psql -U shrimp -d shrimp_market_staging -c "SELECT version_num FROM alembic_version;" 2>/dev/null || echo "Migration table will be created by backend"
            fi

            # Verify backend health with retries
            echo "Verifying backend health..."
            health_retries=10
            for i in $(seq 1 $health_retries); do
              if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
                if curl -sf http://localhost:8000/health 2>/dev/null; then
                  echo "Backend is healthy!"
                  break
                fi
              else
                if curl -sf http://localhost:8080/health 2>/dev/null; then
                  echo "Backend is healthy!"
                  break
                fi
              fi
              echo "Waiting for backend health... ($i/$health_retries)"
              sleep 5
            done

            # Final health check
            if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
              curl -f http://localhost:8000/health || exit 1
            else
              curl -f http://localhost:8080/health || exit 1
            fi

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -f

            echo "=========================================="
            echo "Deployment completed successfully!"
            echo "Environment: ${{ steps.env.outputs.env }}"
            echo "=========================================="

  notify-failure:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Log failure details
        run: |
          echo "Pipeline failed!"
          echo "Run ID: ${{ github.run_id }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Check the Actions tab for details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"