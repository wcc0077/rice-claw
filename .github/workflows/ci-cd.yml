# CI/CD Pipeline for Shrimp Market (Local Build)
#
# Triggered by:
#   - Push to main: Deploy to staging environment
#   - Release: Deploy to production environment
#   - Manual: workflow_dispatch
#
# Requirements:
#   - GitHub Secrets: SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SERVER_SSH_PORT
#   - Server: Docker, Docker Compose, Git installed

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "compose_file=deploy/docker-compose.prod.yml" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "production" ]]; then
              echo "env=prod" >> $GITHUB_OUTPUT
              echo "compose_file=deploy/docker-compose.prod.yml" >> $GITHUB_OUTPUT
            else
              echo "env=staging" >> $GITHUB_OUTPUT
              echo "compose_file=deploy/docker-compose.staging.yml" >> $GITHUB_OUTPUT
            fi
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "compose_file=deploy/docker-compose.staging.yml" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "Deploying ${{ steps.env.outputs.env }} environment"
            echo "Trigger: ${{ github.event_name }}"
            echo "=========================================="

            # Navigate to project directory
            cd /opt/shrimp-market

            # Pull latest code
            echo "Pulling latest code..."
            git pull origin main

            # Build images locally
            echo "Building Docker images..."
            docker compose -f ${{ steps.env.outputs.compose_file }} build --no-cache

            # Stop old containers and start new ones
            echo "Restarting services..."
            docker compose -f ${{ steps.env.outputs.compose_file }} down
            docker compose -f ${{ steps.env.outputs.compose_file }} up -d

            # Wait for health check
            echo "Waiting for services to be healthy..."
            sleep 10

            # Check service status
            docker compose -f ${{ steps.env.outputs.compose_file }} ps

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -f

            echo "=========================================="
            echo "Deployment completed successfully!"
            echo "Environment: ${{ steps.env.outputs.env }}"
            echo "=========================================="

  notify-failure:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 CI/CD Pipeline Failed - ${{ github.run_id }}`,
              body: `
                ## Pipeline Failed

                - **Run ID**: ${{ github.run_id }}
                - **Branch**: ${{ github.ref_name }}
                - **Trigger**: ${{ github.event_name }}
                - **Actor**: @${{ github.actor }}

                [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `,
              labels: ['ci-failure', 'automated']
            })