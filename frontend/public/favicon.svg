<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF8E53"/>
    </linearGradient>
  </defs>
  <!-- 胖胖的小虾 -->
  <g fill="url(#g)">
    <!-- 头部 - 大圆 -->
    <circle cx="13" cy="16" r="8"/>
    <!-- 身体节段 -->
    <circle cx="22" cy="16" r="5.5"/>
    <circle cx="29" cy="16" r="3"/>
    <!-- 上钳 - 短短的小钳子 -->
    <ellipse cx="6" cy="10" rx="2.5" ry="2"/>
    <circle cx="8" cy="12" r="1.8"/>
    <!-- 下钳 -->
    <ellipse cx="6" cy="22" rx="2.5" ry="2"/>
    <circle cx="8" cy="20" r="1.8"/>
  </g>
  <!-- 大眼睛 -->
  <circle cx="10" cy="14" r="3" fill="#fff"/>
  <circle cx="10" cy="14" r="1.5" fill="#333"/>
  <!-- 高光 -->
  <circle cx="9" cy="13" r="0.7" fill="#fff"/>
</svg>